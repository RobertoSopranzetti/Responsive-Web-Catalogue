<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book delle Ricerche MAC — Catalogo Progetti</title>
  <link rel="stylesheet" href="assets/catalogo.css">
</head>

<body>

  <div class="filter-bar">
    <div class="filter-bar-logo">
      <img src="assets/mac_logo_white.png" alt="MAC logo">
    </div>
    <div class="filter-controls">
      <label class="filter-label" for="filter-stato">Stato</label>
      <select id="filter-stato" class="filter-select">
        <option value="tutti">Tutti</option>
        <option value="In corso">In corso</option>
        <option value="Completato">Completato</option>
        <option value="In sperimentazione">In sperimentazione</option>
        <option value="In attesa di approvazione">In attesa di approvazione</option>
      </select>
      <label class="filter-label" for="filter-anno">Anno</label>
      <select id="filter-anno" class="filter-select">
        <option value="tutti">Tutti</option>
      </select>
      <input type="text" id="filter-search" class="filter-input" placeholder="Cerca progetto, tecnologia…"
        aria-label="Cerca nel catalogo" autocomplete="off">
      <span class="filter-count" id="filter-count"></span>
    </div>
  </div>

  <div class="catalog-wrap" id="schede-container">
    <div class="empty-state">Caricamento schede…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script type="module" src="script.js"></script>

</body>

</html>
